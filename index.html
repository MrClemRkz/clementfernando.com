---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Newer Kindle dark — OLED-friendly near-black, clean white text */
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --fg: #ebebeb;
      --fg-muted: #888;
      --border: #2a2a2a;
      --hover-bg: #222;
      --hover-border: #e07b39;
      --accent: #e07b39;
    }

    /* Newer Kindle light — clean pure white, near-black text */
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --fg: #0d0d0d;
      --fg-muted: #6b6b6b;
      --border: #e5e5e5;
      --hover-bg: #f0f0f0;
      --hover-border: #e07b39;
      --accent: #e07b39;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      transition: background 0.22s, color 0.22s;
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
      padding: 0.3rem;
      user-select: none;
      transition: opacity 0.15s;
    }

    .theme-toggle:hover { opacity: 0.65; }

    .card {
      text-align: center;
      padding: 2.5rem 2rem;
    }

    h1 {
      font-family: "Bookerly", Georgia, serif;
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--fg-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.4rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      min-width: 250px;
    }

    a.link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.78rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }

    a.link:hover {
      background: var(--hover-bg);
      border-color: var(--hover-border);
      color: var(--accent);
    }

    a.link:hover svg { fill: var(--accent); }

    a.link svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      fill: var(--fg-muted);
      transition: fill 0.18s;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="toggle" aria-label="Toggle theme">🌙</button>
  <div class="card">
    <h1>{{ site.title }}</h1>
    <p class="subtitle">{{ site.description }}</p>
    <div class="links">
      {% if site.social.github %}
      <a class="link" href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
      {% endif %}
      {% if site.social.linkedin %}
      <a class="link" href="https://linkedin.com/in/{{ site.social.linkedin }}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
      {% endif %}
      {% if site.social.twitter %}
      <a class="link" href="https://twitter.com/{{ site.social.twitter }}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Twitter
      </a>
      {% endif %}
    </div>
  </div>
  <script>
    const toggle = document.getElementById('toggle');
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initial = saved || (prefersDark ? 'dark' : 'light');

    if (initial === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      toggle.textContent = '🌞';
    }

    toggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      if (isDark) {
        document.documentElement.setAttribute('data-theme', 'light');
        toggle.textContent = '🌞';
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
        toggle.textContent = '🌙';
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>
</html>
